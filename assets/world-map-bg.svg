<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <style>
      .grid { fill: none; stroke: rgba(0,255,136,0.015); stroke-width: 1; }
      .continent { fill: none; stroke: rgba(0,255,136,0.12); stroke-width: 1.5; stroke-linejoin: round; }
      .continent-fill { fill: rgba(0,255,136,0.02); }
      .meridian { fill: none; stroke: rgba(0,255,136,0.04); stroke-width: 0.5; }
      .parallel { fill: none; stroke: rgba(0,255,136,0.04); stroke-width: 0.5; }
    </style>
  </defs>
  
  <!-- 网格背景 -->
  <pattern id="smallGrid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" class="grid"/>
  </pattern>
  <rect width="2000" height="1000" fill="url(#smallGrid)"/>
  
  <!-- 经线 -->
  <g class="meridian">
    <line x1="100" y1="0" x2="100" y2="1000"/>
    <line x1="200" y1="0" x2="200" y2="1000"/>
    <line x1="300" y1="0" x2="300" y2="1000"/>
    <line x1="400" y1="0" x2="400" y2="1000"/>
    <line x1="500" y1="0" x2="500" y2="1000"/>
    <line x1="600" y1="0" x2="600" y2="1000"/>
    <line x1="700" y1="0" x2="700" y2="1000"/>
    <line x1="800" y1="0" x2="800" y2="1000"/>
    <line x1="900" y1="0" x2="900" y2="1000"/>
